name: Deploy SR-Homes

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Website bauen ──
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build Website
        run: |
          if [ -f website/dist/index.html ]; then
            echo "Pre-built dist/ found, skipping build"
          else
            cd website/src && npm ci && npm run build
          fi

      # ── Portal bauen ──
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
      - name: Build Portal
        run: cd portal && composer install --no-scripts --no-interaction && npm ci && npm run build

      # ── Alles per SSH deployen ──
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_SHA
          script: |
            echo "Starting deploy for $GITHUB_SHA"

            # Verzeichnisse erstellen falls nicht vorhanden
            mkdir -p /var/www/sr-homes-website
            mkdir -p /var/www/srhomes

            echo "Deploy erfolgreich: $(date)"

      # ── Website-Dateien hochladen ──
      - name: Upload Website
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "website/dist/index.html,website/dist/assets"
          target: "/var/www/sr-homes-website"
          strip_components: 2

      # ── Portal-Dateien hochladen ──
      - name: Upload Portal
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "portal/public"
          target: "/var/www/srhomes"
          strip_components: 1

      # ── Rechte setzen + PHP restart ──
      - name: Finalize
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            chmod -R 755 /var/www/sr-homes-website
            chmod -R 755 /var/www/srhomes
            systemctl reload php8.3-fpm 2>/dev/null || true
            echo "Deploy abgeschlossen: $(date)"
            ls -la /var/www/sr-homes-website/
