name: Deploy SR-Homes

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Website: pre-built in website/dist/, kein Build nötig ──

      # ── Portal bauen ──
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
      - name: Build Portal
        run: cd portal && composer install --no-scripts --no-interaction && npm ci && npm run build

      # ── Alles per SSH deployen ──
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_SHA
          script: |
            echo "Starting deploy for $GITHUB_SHA"

            # Verzeichnisse erstellen falls nicht vorhanden
            mkdir -p /var/www/sr-homes-website
            mkdir -p /var/www/srhomes

            echo "Deploy erfolgreich: $(date)"

      # ── Website-Dateien hochladen ──
      - name: Upload Website
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "website/dist/index.html,website/dist/assets"
          target: "/var/www/sr-homes-website"
          strip_components: 2

      # ── Portal-Dateien hochladen ──
      - name: Upload Portal
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "portal/public"
          target: "/var/www/srhomes"
          strip_components: 1

      # ── Website V2 hochladen ──
      - name: Upload Website V2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "website-v2/"
          target: "/var/www/sr-homes-v2"
          strip_components: 1

      # ── Rechte setzen + nginx config + PHP restart ──
      - name: Finalize
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            chmod -R 755 /var/www/sr-homes-website
            chmod -R 755 /var/www/srhomes
            chmod -R 755 /var/www/sr-homes-v2

            # Setup nginx for V2 on port 8082 (if not already configured)
            if [ ! -f /etc/nginx/sites-enabled/sr-homes-v2 ]; then
              cat > /etc/nginx/sites-available/sr-homes-v2 << 'NGINX'
            server {
                listen 8082;
                server_name _;
                root /var/www/sr-homes-v2;
                index index.html;

                location / {
                    try_files $uri $uri.html $uri/ /index.html;
                }

                location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|mp4|webp)$ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }
            }
            NGINX
              ln -sf /etc/nginx/sites-available/sr-homes-v2 /etc/nginx/sites-enabled/
              nginx -t && systemctl reload nginx
              # Open port 8082 in firewall
              ufw allow 8082/tcp 2>/dev/null || iptables -I INPUT -p tcp --dport 8082 -j ACCEPT 2>/dev/null || true
              echo "Nginx V2 config created on port 8082"
            fi

            systemctl reload php8.3-fpm 2>/dev/null || true
            echo "Deploy abgeschlossen: $(date)"
            ls -la /var/www/sr-homes-v2/
