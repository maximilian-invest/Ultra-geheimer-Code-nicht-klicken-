name: Deploy SR-Homes

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Website: pre-built in website/dist/, kein Build nötig ──

      # ── Alles auf dem Server deployen (PHP + JS Build) ──
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_SHA
          command_timeout: 10m
          script: |
            set -e
            echo "=== Deploy $GITHUB_SHA ==="

            # 1. Pull latest code
            cd /var/www/sr-deploy
            git fetch origin
            git reset --hard origin/main
            echo "✓ Code pulled"

            # 2. Sync all portal files (like deploy.sh does)
            mkdir -p /var/www/srhomes
            rsync -a --delete \
              --exclude="vendor/" \
              --exclude="node_modules/" \
              --exclude=".env" \
              --exclude=".env.backup" \
              --exclude=".env.production" \
              --exclude="storage/app/public/property_files/" \
              --exclude="storage/app/public/property_images/" \
              --exclude="storage/app/public/website/" \
              --exclude="storage/app/public/kaufanbote/" \
              --exclude="storage/app/public/global_files/" \
              --exclude="storage/logs/" \
              --exclude="storage/framework/cache/" \
              --exclude="storage/framework/sessions/" \
              --exclude="storage/framework/views/" \
              --exclude="storage/*.key" \
              --exclude="public/build/" \
              --exclude="public/hot" \
              --exclude="public/storage" \
              --exclude="auth.json" \
              portal/ /var/www/srhomes/
            echo "✓ Portal synced"

            # 3. Build JS on server
            cd /var/www/srhomes
            composer install --no-scripts --no-interaction --no-dev 2>&1 | tail -3
            npm ci --quiet 2>&1 | tail -3
            npm run build 2>&1 | tail -5
            echo "✓ JS built"

            # 4. Clear caches + reload
            php artisan config:clear 2>/dev/null || true
            php artisan cache:clear 2>/dev/null || true
            php artisan view:clear 2>/dev/null || true
            systemctl reload php8.3-fpm 2>/dev/null || true
            echo "✓ PHP cache cleared"

            # 5. Sync website-v2
            mkdir -p /var/www/sr-homes-v2
            rsync -a /var/www/sr-deploy/website-v2/ /var/www/sr-homes-v2/
            echo "✓ Website v2 synced"

            # 6. Sync legacy website
            mkdir -p /var/www/sr-homes-website
            rsync -a /var/www/sr-deploy/website/ /var/www/sr-homes-website/ 2>/dev/null || true

            # 7. Permissions
            chmod -R 755 /var/www/sr-homes-website
            chmod -R 755 /var/www/srhomes
            chmod -R 755 /var/www/sr-homes-v2

            # 8. Nginx V2 config
            cat > /etc/nginx/sites-available/sr-homes-v2 << 'NGINX'
            server {
                listen 8082;
                server_name _;
                root /var/www/sr-homes-v2;
                index index.html;
                location / {
                    try_files $uri $uri.html $uri/ =404;
                }
            }
            NGINX
            ln -sf /etc/nginx/sites-available/sr-homes-v2 /etc/nginx/sites-enabled/sr-homes-v2
            nginx -t && systemctl reload nginx

            systemctl reload php8.3-fpm 2>/dev/null || true
            echo "=== Deploy complete: $(date) ==="
