name: Deploy SR-Homes

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Website bauen (in GitHub Actions) ──
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build Website
        run: cd website/src && npm ci && npm run build

      # ── Portal bauen (in GitHub Actions) ──
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
      - name: Build Portal
        run: cd portal && composer install --no-scripts --no-interaction && npm ci && npm run build

      # ── Website-Dist auf Server kopieren ──
      - name: Deploy Website
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "website/dist/*"
          target: "/var/www/sr-homes-website"
          strip_components: 2
          overwrite: true

      # ── Portal auf Server kopieren ──
      - name: Deploy Portal
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "portal/*"
          target: "/var/www/srhomes"
          strip_components: 1
          overwrite: true

      # ── PHP neustarten ──
      - name: Restart PHP
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            systemctl reload php8.3-fpm 2>/dev/null || true
            echo "Deploy erfolgreich: $(date)"
