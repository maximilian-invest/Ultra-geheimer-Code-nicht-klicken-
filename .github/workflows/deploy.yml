name: Deploy SR-Homes

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Website: pre-built in website/dist/, kein Build nötig ──

      # ── Alles auf dem Server deployen (PHP + JS Build) ──
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_SHA
          command_timeout: 10m
          script: |
            set -e
            echo "=== Deploy $GITHUB_SHA ==="

            # 1. Pull latest code
            cd /var/www/sr-deploy
            git fetch origin
            git reset --hard origin/main
            echo "✓ Code pulled"

            # 2. Sync PHP files
            mkdir -p /var/www/srhomes
            rsync -a portal/app/              /var/www/srhomes/app/
            rsync -a portal/routes/           /var/www/srhomes/routes/
            rsync -a portal/config/           /var/www/srhomes/config/
            rsync -a portal/database/         /var/www/srhomes/database/
            rsync -a portal/resources/views/  /var/www/srhomes/resources/views/
            rsync -a portal/resources/js/     /var/www/srhomes/resources/js/
            rsync -a portal/resources/css/    /var/www/srhomes/resources/css/
            rsync -a portal/package.json portal/package-lock.json portal/vite.config.js /var/www/srhomes/ 2>/dev/null || true
            echo "✓ PHP + resources synced"

            # 3. Build JS on server
            cd /var/www/srhomes
            npm ci --quiet 2>&1 | tail -3
            npm run build 2>&1 | tail -5
            echo "✓ JS built"

            # 4. Clear caches + reload
            php artisan config:clear 2>/dev/null || true
            php artisan cache:clear 2>/dev/null || true
            php artisan view:clear 2>/dev/null || true
            systemctl reload php8.3-fpm 2>/dev/null || true
            echo "✓ PHP cache cleared"

            # 5. Sync website-v2
            mkdir -p /var/www/sr-homes-v2
            rsync -a /var/www/sr-deploy/website-v2/ /var/www/sr-homes-v2/
            echo "✓ Website v2 synced"

            # 6. Sync legacy website
            mkdir -p /var/www/sr-homes-website
            rsync -a /var/www/sr-deploy/website/ /var/www/sr-homes-website/ 2>/dev/null || true

            # 7. Permissions
            chmod -R 755 /var/www/sr-homes-website
            chmod -R 755 /var/www/srhomes
            chmod -R 755 /var/www/sr-homes-v2

            # 8. Nginx V2 config
            cat > /etc/nginx/sites-available/sr-homes-v2 << 'NGINX'
            server {
                listen 8082;
                server_name _;
                root /var/www/sr-homes-v2;
                index index.html;
                location / {
                    try_files $uri $uri.html $uri/ =404;
                }
            }
            NGINX
            ln -sf /etc/nginx/sites-available/sr-homes-v2 /etc/nginx/sites-enabled/sr-homes-v2
            nginx -t && systemctl reload nginx

            systemctl reload php8.3-fpm 2>/dev/null || true
            echo "=== Deploy complete: $(date) ==="
