      <div class="lg:col-span-2 space-y-8">

        <div id="features"></div>
        <div id="details-table"></div>

          <div class="text-xs font-bold uppercase tracking-widest mb-2" style="color:#9A958C">Kaufpreis</div>
          <div id="prop-price" class="text-2xl md:text-3xl font-black tracking-tight mb-6" style="color:#0A0A08"></div>
          <a href="kontakt.html" class="flex items-center justify-center gap-2 w-full py-4 rounded-full text-sm font-bold text-white mb-4" style="background:#D4743B">

          </a>
          <div class="flex gap-3">

        </div>

          <div class="flex items-center gap-4 mb-5">
            <div class="w-14 h-14 rounded-full flex items-center justify-center text-lg font-bold text-white" style="background:#D4743B">MH</div>
            <div>

              <div class="text-xs" style="color:#9A958C">Konzessionierter Immobilientreuhänder</div>

            <div class="flex items-center gap-3"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#D4743B" stroke-width="2" class="shrink-0" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>hoelzl@sr-homes.at</span></div>

          </div>
        </div>
